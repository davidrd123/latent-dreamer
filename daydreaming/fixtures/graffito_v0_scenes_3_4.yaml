nodes:
  - id: g_s1_n01_feet_pounding
    name: Feet pounding pavement
    scene_ref: "Scene 3, Shot 5"
    variant_of: null
    variant_family: null
    situation_ids: [s1_street_overwhelm]
    dwell_s: 4.0
    visual_description: >
      Graffito Mixed-Media Stop-Motion - A low child-height close-up
      locks onto Tony, a 7-year-old puppet with a PAINTED PAPER CUTOUT
      body in a light blue shirt with a red collar and beige pants and a
      PHOTOGRAPHIC CUTOUT face with curly hair and green eyes, but the
      frame only catches his feet and lower legs as he runs. His shoes
      slap wet pavement in quick, jerky stop-motion beats. Slatted
      shadow bands from the elevated track stripe the sidewalk. The
      street surface looks built from PAINTED CARDBOARD and CRUMPLED
      PAPER, with gritty gray paint, VISIBLE BRUSHSTROKES, and little
      puddle reflections trembling under each landing. The camera tracks
      with his pounding steps as urgency builds from the ground up.
    characters: [Tony]
    objects: []
    valences:
      hope: 0.1
      threat: 0.3
      dread: 0.2
      joy: 0.0
      wonder: 0.0
    tags: [running, feet, pavement, street, urgency, tactile]

  - id: g_s1_n02_hand_over_graffiti
    name: Hand skimming graffiti mural
    scene_ref: "Scene 3, Shot 6"
    variant_of: null
    variant_family: null
    situation_ids: [s1_street_overwhelm]
    dwell_s: 4.5
    visual_description: >
      Graffito Mixed-Media Stop-Motion - A close-up rides beside Tony as
      his small articulated paper hand drags across GRAFFITI MURALS on a
      wall made from layered PAINTED CARDBOARD. Thick ridges of THICK
      IMPASTO PAINT catch the light while RAW TORN EDGES and pencil
      lines make the mural feel half painted, half torn from a sketch
      page. His fingers skim the surface as if he sees through touch.
      Flecks of primary color and charcoal scrawls unfold in sequence
      under his hand. The camera stays tight on paint, paper grain, and
      motion, turning the wall into a tactile story strip while Tony
      keeps moving just out of full view.
    characters: [Tony]
    objects: [GRAFFITI MURALS]
    valences:
      hope: 0.2
      threat: 0.1
      dread: 0.1
      joy: 0.1
      wonder: 0.2
    tags: [graffiti, hand, mural, touch, paint, tactile]

  - id: g_s1_n03_forest_of_legs
    name: Forest of adult legs
    scene_ref: "Scene 3, Shot 7"
    variant_of: null
    variant_family: null
    situation_ids: [s1_street_overwhelm]
    dwell_s: 5.0
    visual_description: >
      Graffito Mixed-Media Stop-Motion - The camera drops low into a
      forest of adult legs made from PAINTED PAPER CUTOUT bodies and
      PHOTOGRAPHIC CUTOUT faces that stay mostly out of frame. Tony
      darts through them with quick, clumsy stop-motion steps, tiny
      against towering knees, swinging coats, shopping bags, and elbows.
      The anonymous street figures move in staggered rhythms as if the
      whole sidewalk is a crowded puppet machine. Painted trouser legs
      and skirt hems pass close to the lens with VISIBLE BRUSHSTROKES,
      IMPASTO smears, and thin paper edges flashing when they turn.
      Tony slaloms through narrow openings, always almost clipped,
      always searching for a line forward.
    characters: [Tony]
    objects: []
    valences:
      hope: 0.1
      threat: 0.4
      dread: 0.3
      joy: 0.0
      wonder: 0.0
    tags: [crowd, legs, slalom, anonymity, pressure, street]

  - id: g_s1_n03v_legs_overwhelm
    name: Forest of legs closes in
    scene_ref: "Scene 3, Shot 7"
    variant_of: g_s1_n03_forest_of_legs
    variant_family: REVERSAL
    situation_ids: [s1_street_overwhelm]
    dwell_s: 5.5
    visual_description: >
      Graffito Mixed-Media Stop-Motion - The same low-angle street
      corridor warps into Tony's overload. Adult legs made from PAINTED
      PAPER CUTOUTS crowd the frame from every side until the gaps nearly
      seal shut. Knees, shoes, shopping bags, and coat hems lurch past in
      jerky stop-motion bursts while Tony is trapped at the center,
      smaller with each beat. The sidewalk texture breaks into CRUMPLED
      PAPER shadows and smeared paint bands. Faces never settle; only
      fragments flash above him as if the crowd has become a moving wall.
      The camera jitters and compresses space so the street feels
      claustrophobic, threatening, and too full to breathe through.
    characters: [Tony]
    objects: []
    valences:
      hope: 0.0
      threat: 0.7
      dread: 0.8
      joy: 0.0
      wonder: 0.0
    tags: [reversal, overload, crowd, claustrophobic, legs, threat]

  - id: g_s1_n04_eyes_searching
    name: Eyes searching for Monk
    scene_ref: "Scene 3, Shot 8"
    variant_of: null
    variant_family: null
    situation_ids: [s1_street_overwhelm]
    dwell_s: 4.5
    visual_description: >
      Graffito Mixed-Media Stop-Motion - A tight medium close-up catches
      Tony's PHOTOGRAPHIC CUTOUT face as he runs, mouth open mid-shout,
      calling for Monk while his green eyes scan side to side instead of
      the path ahead. His light blue PAINTED PAPER CUTOUT shirt jerks in
      and out of the frame with each step. Behind him, the South Bronx
      blurs into PAINTED CARDBOARD storefronts, food carts, boom boxes,
      and windows where voices seem to spill out. Harsh late-afternoon
      light slices across his face in bands from the elevated track. The
      camera stays close enough to feel his distracted focus: he is
      searching everywhere except the one place that would keep him safe.
    characters: [Tony]
    objects: []
    valences:
      hope: 0.2
      threat: 0.4
      dread: 0.3
      joy: 0.0
      wonder: 0.0
    tags: [eyes, searching, Monk, shout, distraction, urgency]

  - id: g_s1_n05_cab_near_miss
    name: Cab near miss
    scene_ref: "Scene 3, Shot 9"
    variant_of: null
    variant_family: null
    situation_ids: [s1_street_overwhelm]
    dwell_s: 4.5
    visual_description: >
      Graffito Mixed-Media Stop-Motion - A yellow cab prop made from
      PAINTED CARDBOARD lunges into the foreground with a violent
      stop-motion jerk, its headlights flaring as Tony steps into its
      path. The camera catches the near miss from child height so the
      grille and skewed tire ellipse feel huge and abrupt. Tony freezes
      just as the cab fills the frame, his body stiff and his face
      startled. Street texture, graffiti, and passing figures snap into a
      harsh diagonal composition under the screech. The moment is not yet
      full collapse; it is the clean shock point, the instant where
      danger lands and his body stops before his mind catches up.
    characters: [Tony]
    objects: []
    valences:
      hope: 0.0
      threat: 0.8
      dread: 0.7
      joy: 0.0
      wonder: 0.0
    tags: [cab, near_miss, shock, freeze, street, impact]

  - id: g_s1_n05v_cab_overwhelm
    name: Cab near miss as full overwhelm
    scene_ref: "Scene 3, Shot 9"
    variant_of: g_s1_n05_cab_near_miss
    variant_family: REVERSAL
    situation_ids: [s1_street_overwhelm]
    dwell_s: 6.0
    visual_description: >
      Graffito Mixed-Media Stop-Motion - The cab near miss detonates into
      Tony's full sensory burst. The yellow PAINTED CARDBOARD cab fills
      the frame, then the image shatters into single-frame flashes:
      pigeon wings, pretzel umbrellas, sneaker soles, grates, posters,
      graffiti fragments, splashes of THICK IMPASTO PAINT, all stamped
      over CRUMPLED PAPER texture. Tony's terrified green eyes appear for
      an instant, then disappear under the cacophony. Every element hits
      with a jerky stop-motion snap as if the city is firing images at
      him faster than he can sort them. The composition stops behaving
      like a street scene and becomes a sensory storm that consumes the
      whole screen before anything can reset.
    characters: [Tony]
    objects: []
    valences:
      hope: 0.0
      threat: 0.9
      dread: 1.0
      joy: 0.0
      wonder: 0.1
    tags: [reversal, cab, cacophony, burst, overwhelm, freeze]

  - id: g_s1_n06_drone_pullback
    name: Regroup and drone pullback
    scene_ref: "Scene 3, Shot 10"
    variant_of: null
    variant_family: null
    situation_ids: [s1_street_overwhelm]
    dwell_s: 6.5
    visual_description: >
      Graffito Mixed-Media Stop-Motion - An extreme close-up starts on
      Tony's PHOTOGRAPHIC CUTOUT eyes, wide and wet with fear, then
      slowly pulls back as his breathing steadies and his body regains
      motion. He takes off running again in small, determined stop-motion
      ticks. The camera keeps lifting and widening until the whole hood
      opens beneath him as THE CITYSCAPE MONTAGE: PAINTED CARDBOARD
      buildings, reflective streets, tiny paper pedestrians, a train line
      overhead, and bursts of graffiti color threading through gray
      blocks. Tony gets smaller as the neighborhood gets bigger. The shot
      turns recovery into scale, carrying him out of panic and toward the
      apartment window that will receive the camera next.
    characters: [Tony]
    objects: [THE CITYSCAPE MONTAGE]
    valences:
      hope: 0.4
      threat: 0.3
      dread: 0.3
      joy: 0.0
      wonder: 0.3
    tags: [recovery, drone, cityscape, reset, running, scale]

  - id: g_s2_n01_camera_enters_window
    name: Camera enters Grandma's apartment
    scene_ref: "Scene 4, Shot 10 cont."
    variant_of: null
    variant_family: null
    situation_ids: [s2_grandmas_apartment]
    dwell_s: 5.5
    visual_description: >
      Graffito Mixed-Media Stop-Motion - The same camera that pulled up
      over the neighborhood glides through a window frame and levels into
      Grandma's apartment. The room feels old tenement and handmade at
      once: books stacked deep, collages, paintings hung on walls and
      painted directly onto walls, found objects, old family photos, and
      shelves crowded with a lifetime of things. Every surface shows
      VISIBLE BRUSHSTROKES, layered PAINTED CARDBOARD, and warm wear. The
      light softens from street glare to amber interior glow while FELA'S
      BLACK PRESIDENT pulses from mismatched speakers. The move itself is
      magical but grounded, carrying street momentum into a room that
      feels busy, textured, and out of time.
    characters: []
    objects: []
    valences:
      hope: 0.5
      threat: 0.0
      dread: 0.0
      joy: 0.2
      wonder: 0.4
    tags: [window, apartment, books, collages, transition, warmth]

  - id: g_s2_n02_monk_painting
    name: Monk dancing as he paints
    scene_ref: "Scene 4, Shot 10 cont."
    variant_of: null
    variant_family: null
    situation_ids: [s2_grandmas_apartment]
    dwell_s: 5.0
    visual_description: >
      Graffito Mixed-Media Stop-Motion - Monk, a 27-year-old puppet with
      a PAINTED PAPER CUTOUT body splattered in THICK IMPASTO PAINT and a
      PHOTOGRAPHIC CUTOUT face with a beard and glasses, sways through
      Grandma's living room as if he cannot paint without dancing.
      Furniture has been pushed aside to make an art studio from the room
      itself. He turns with fluid, rhythmic stop-motion motion, brush arm
      lifting and falling while a canvas catches streaks of color. The
      camera passes him in a medium shot, reading his painted shirt,
      paper-thin edges, and quick pivots against walls crowded with
      artwork. The whole room moves to his groove before Tony even enters
      it.
    characters: [Monk]
    objects: []
    valences:
      hope: 0.6
      threat: 0.0
      dread: 0.0
      joy: 0.5
      wonder: 0.2
    tags: [Monk, painting, dancing, studio, rhythm, freedom]

  - id: g_s2_n03_tony_bursts_in
    name: Tony bursts through the front door
    scene_ref: "Scene 4, Shot 10 cont."
    variant_of: null
    variant_family: null
    situation_ids: [s2_grandmas_apartment]
    dwell_s: 4.5
    visual_description: >
      Graffito Mixed-Media Stop-Motion - The camera pans with Monk, then
      whips to the front door just as Tony bursts inside. Tony, a
      7-year-old puppet with a PAINTED PAPER CUTOUT body and a
      PHOTOGRAPHIC CUTOUT face with curly hair and bright green eyes,
      comes through the doorway with jerky, excited momentum, shouting
      toward Monk before he has fully stopped moving. Yellow light spills
      from the hall behind him while the apartment opens around him in
      warm clutter. Colored paint flecks already hang in the air, and
      Monk's turning body pulls the room into Tony's arrival. The shot
      makes reunion feel like an impact event, but this time the impact
      is joy.
    characters: [Tony, Monk]
    objects: []
    valences:
      hope: 0.8
      threat: 0.0
      dread: 0.0
      joy: 0.8
      wonder: 0.2
    tags: [arrival, reunion, doorway, burst, father, joy]

  - id: g_s2_n04_dance_together
    name: Monk and Tony paint-dance together
    scene_ref: "Scene 4, Shot 11"
    variant_of: null
    variant_family: null
    situation_ids: [s2_grandmas_apartment]
    dwell_s: 6.0
    visual_description: >
      Graffito Mixed-Media Stop-Motion - Monk and Tony share the frame in
      a medium two-shot, painting by dancing to AFROBEAT HORNS. Monk's
      fluid stop-motion sway answers Tony's quicker, smaller hops until
      their articulated paper arms move like trombones in and out of the
      composition. Loaded brushes fling THICK IMPASTO PAINT through the
      air, and the paint lands like confetti across clothes, floor, and
      walls already thick with collaged life. The camera pans a simple
      arc to keep both bodies balanced as they rotate. Warm interior
      light and handmade textures make the room feel fully alive. This is
      mess, rhythm, and belonging in the same breath.
    characters: [Tony, Monk]
    objects: []
    valences:
      hope: 0.9
      threat: 0.0
      dread: 0.0
      joy: 1.0
      wonder: 0.3
    tags: [dance, painting, two_shot, afrobeat, freedom, confetti]

  - id: g_s2_n05_grandma_enters
    name: Grandma enters with the bowls
    scene_ref: "Scene 4, Shot 11-12"
    variant_of: null
    variant_family: null
    situation_ids: [s2_grandmas_apartment]
    dwell_s: 5.5
    visual_description: >
      Graffito Mixed-Media Stop-Motion - Grandma is heard before she is
      seen, then she enters from the bottom of the frame carrying two
      steaming bowls with deliberate, purposeful stop-motion steps.
      Grandma, an older puppet with a teal PAINTED PAPER CUTOUT body, a
      pearl-like necklace, and a PHOTOGRAPHIC CUTOUT face with glasses
      and dark styled hair, rises into a slightly low angle that gives
      her arrival weight. Monk and Tony remain on either side of the room
      under drifting paint flecks while her stern silhouette becomes the
      visual downbeat. The apartment stays warm and textured, but the
      energy changes as soon as she assesses the damage. Grounding enters
      the scene without killing its love.
    characters: [Grandma, Tony, Monk]
    objects: []
    valences:
      hope: 0.4
      threat: 0.2
      dread: 0.1
      joy: 0.3
      wonder: 0.1
    tags: [Grandma, bowls, authority, grounding, interruption, family]

