title: Kai kitchen patch test
places:
- id: kitchen
  description: The domestic surface where delay rituals can masquerade as care.
- id: harbor
  description: The meeting place where rupture and possible repair stay equally live.
events:
- id: ev_harbor_meeting_tonight
  description: The harbor meeting requested for tonight remains pending.
  anchor_places:
  - harbor
situations:
- id: sit_unopened_letter
  place_id: kitchen
  resolution_path_count: 3
  description: Kai is in the kitchen with his sister's unopened letter still on the
    table and the harbor appointment pressing toward evening.
- id: sit_threshold_departure
  place_id: kitchen
  resolution_path_count: 2
  description: The threshold where Kai either leaves for the harbor or lets delay
    harden into the answer.
origin_pressures:
- id: p_attachment_threat
  description: Pressure from wanting repair with his sister and fearing what contact
    will reopen.
- id: p_obligation
  description: Pressure from the unanswered request to meet tonight.
- id: p_departure_threshold
  description: Pressure created by the fact that leaving now is becoming the only
    real answer.
reference_markers:
- id: harbor_as_shared_place
  description: The harbor as the shared place that carries both rupture and possible
    repair.
- id: ref_letter_address
  description: The return address and handwriting on the unopened letter.
- id: ref_counter_ritual
  description: The counter-cleaning, towel-folding, and coffee-pouring rituals Kai
    uses instead of deciding.
- id: ref_tide_schedule
  description: Kai's involuntary knowledge of the tide and the hour of the meeting.
