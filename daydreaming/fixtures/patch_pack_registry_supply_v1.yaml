  patch_nodes:
  - patch_node_id: k_patch_anchor
    bank_id: supply-v1-kai-batch1-20260315:s05:st01:beat_kai_kettle_ritual
    overrides:
      name: Tea precision instead of opening
      scene_ref: Kai generated pack A 1
      visual_description: Kai fills the electric kettle a second time, though the
        first cup sits untouched and already cold beside the letter. He measures the
        tea leaves with a precision he never bothers with normally, leveling the spoon
        against the rim of the tin, counting seconds under his breath—the kind of
        focus that requires just enough attention to crowd out the smell of salt water
        he keeps almost noticing, as if the harbor has followed the envelope indoors.
        The letter does not move, and he does not look at it, but his back stays angled
        toward it the way a person angles away from a window when they don't want
        to be seen from outside.
      objects:
      - kettle
      - tea-tin
      - letter
      tags:
      - tea
      - precision
      - generated-pack-a
  - patch_node_id: k_patch_intensifier
    bank_id: supply-v1-kai-batch1-20260315:s02:st01:beat_kai_ritual_distraction_kitchen
    overrides:
      name: Counter as answer
      scene_ref: Kai generated pack A 2
      visual_description: Kai refills his coffee cup for the third time, watching
        the pour with the concentration of someone defusing something, the letter
        still face-down on the table where he flipped it an hour ago so the handwriting
        wouldn't keep catching his eye. He wipes the counter in slow horizontal strokes,
        and when he reaches the edge nearest the table he stops, pivots, and wipes
        the other direction. The harbor is six blocks away and the evening is already
        going gray at the window, and he knows that every minute he stands here with
        a clean counter is a kind of answer.
      objects:
      - coffee
      - counter
      - letter
      tags:
      - counter
      - answer
      - generated-pack-a
  - patch_node_id: k_patch_contrast
    bank_id: supply-v1-kai-batch1-20260315:s04:st01:beat_kai_dish_towel_avoidance
    overrides:
      name: Phone-line silence in the towel
      scene_ref: Kai generated pack A 3
      visual_description: Kai refolds the dish towel on the counter—once, then again,
        aligning the edges with a precision the task doesn't require, the letter still
        face-down where he set it without reading the front. He turns on the faucet
        to rinse a mug that is already clean, and the sound of the water fills the
        kitchen the way silence used to fill a phone line he once let ring out. The
        harbor is maybe three miles away, and he is aware of its direction the way
        you are aware of a bruise you keep almost touching.
      objects:
      - dish-towel
      - faucet
      - letter
      tags:
      - dish-towel
      - phone-line
      - generated-pack-a
  - patch_node_id: k_patch_bridge
    bank_id: supply-v1-kai-batch1-20260315:s02:st02:beat_kai_faucet_evasion
    overrides:
      name: Faucet as last-possible-moment math
      scene_ref: Kai generated pack A 4
      visual_description: Kai turns on the faucet to rinse a mug that doesn't need
        rinsing, and the sound of the water fills the kitchen the way he needs it
        to—present, purposeful, covering. He has been calculating, without quite admitting
        he is calculating, how long the walk to the harbor would take if he left at
        the last possible moment, and the number keeps revising itself upward. The
        letter lies face-down where he put it, and he doesn't look at it, but he knows
        its exact position the way you know a bruise without touching it, and the
        gray at the window is deepening in a way that feels less like evening and
        more like a door closing.
      objects:
      - faucet
      - mug
      - letter
      tags:
      - faucet
      - bridge
      - generated-pack-a
