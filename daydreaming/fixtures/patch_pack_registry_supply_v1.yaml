- pack_id: kai_supply_v1_pack_a
  fixture_family: kai
  source: supply_v1
  base_fixture: daydreaming/fixtures/kai_patch_test_generated_v0.yaml
  output_fixture: daydreaming/fixtures/kai_patch_test_generated_pack_a_v1.yaml
