      scene_ref: Kai generated pack B 3
      visual_description: Kai refills his coffee cup though it's still half full,
        watching the steam rise with the specific attention of someone performing
        normalcy for an audience of one. The letter sits at the edge of his vision,
        a white rectangle he keeps not looking at directly, the way you don't look
        at a bruise you're not ready to name. His hands move to straighten the dish
