title: Tessa coatroom patch test
places:
- id: hotel_coatroom
  description: A cramped after-event space where applause fades into self-justification.
- id: donor_hall
  description: The room where Tessa publicly claimed the project as if Eli were incidental.
events:
- id: ev_toast_credit_cut
  description: Tessa publicly described the project in a way that erased Eli's work.
  anchor_places:
  - donor_hall
- id: ev_eli_texts_afterward
  description: Eli texted after the toast, "We need to talk about what you just did."
  anchor_places:
  - hotel_coatroom
situations:
- id: sit_coatroom_after_toast
  place_id: hotel_coatroom
  resolution_path_count: 3
  description: Minutes after the donor toast, Tessa is alone in the coatroom with
    Eli's text active and the evening still pressing through the walls.
- id: sit_text_reply_threshold
  place_id: hotel_coatroom
  resolution_path_count: 2
  description: The threshold where Tessa either sends a message to Eli or keeps turning
    motive into cover.
origin_pressures:
- id: p_status_damage
  description: Pressure from publicly cutting Eli out of the story.
- id: p_obligation
  description: Pressure from owing Eli an acknowledgment after the public cut.
- id: p_reply_threshold
  description: Pressure created by the possibility of sending a reply now.
reference_markers:
- id: ref_program_credit_line
  description: The printed credit line in the event program that Tessa ignored in
    the toast.
- id: ref_unsent_draft
  description: An unsent draft that keeps turning from apology into explanation.
- id: ref_hall_afterglow
  description: The donor hall applause and afterglow still pressing through the coatroom.
