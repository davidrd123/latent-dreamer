    updated_concerns:
      - concern_id: cc_attachment_threat
        old_intensity: 0.72
        new_intensity: 0.82
        rationale: focus_intensified
      - concern_id: cc_obligation
        old_intensity: 0.64
        new_intensity: 0.59
        rationale: brief_diversion_without_resolution
