  visual_description: Kai refolds the dish towel on the counter with precise, unnecessary
    care, smoothing the same crease three times while the letter sits at the edge
    of his peripheral vision like something he has already decided not to see. He
    fills a glass of water he doesn't want, drinks half of it standing at the sink
    with his back mostly to the table, and watches the window above the faucet where
    the sky has gone the particular gray that means evening is closer than he has
    been letting it be. His hands know the harbor from six months ago—the cold railing,
    the way her voice carried over the water when she said the word honestly like
    it was a door she was holding open—and they tighten slightly around the glass
    before he sets it down and reaches for the dish towel again.
