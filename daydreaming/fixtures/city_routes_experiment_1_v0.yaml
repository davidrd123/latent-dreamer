graph_id: city_routes_experiment_1_v0
title: The City Routes Around You
brief_ref: /Users/daviddickinson/Projects/Lora/latent-dreamer/daydreaming/Notes/experiential-design/23-brief-city-night-pursuit.md
source_palette: /Users/daviddickinson/Projects/Lora/scope-drd/content/palettes/escape_new_york.v2-layered.palette.yaml

places:
  - id: platform
    description: The elevated platform where missed timing becomes route destiny.
  - id: market
    description: The alley market where concealment and drag arrive together.
  - id: rooftop
    description: The rooftop and bridge threshold where crossings become inspections.
  - id: club
    description: The public interior where spectacle can hide or expose the route.
  - id: apartment
    description: The borrowed kitchen refuge where the package can be set down once.
  - id: warehouse
    description: The river-edge exchange zone where the route stops being transit.

events:
  - id: e1_train_missed
    description: The last train doors close before the courier reaches them.
    anchor_places: [platform]
  - id: e2_blackout_siren
    description: A blackout and siren wave turn concealment into exposure.
    anchor_places: [club, market]
  - id: e3_wrong_handoff
    description: The package nearly goes to the wrong receiver under the wrong light.
    anchor_places: [warehouse]
  - id: e4_bridge_lockdown
    description: The bridge checkpoint seals and forces a rooftop workaround.
    anchor_places: [rooftop]

situations:
  - id: s1_the_run
    place_id: platform
    resolution_path_count: 2
    description: The courier is in motion and timing still feels objective.
  - id: s2_the_detour
    place_id: market
    resolution_path_count: 3
    description: The clean route has failed and the city is routing by friction.
  - id: s3_false_refuge
    place_id: apartment
    resolution_path_count: 2
    description: Shelter is real, but staying sheltered costs the route.
  - id: s4_public_spectacle
    place_id: club
    resolution_path_count: 3
    description: Spectacle can swallow the courier or pin him under the light.
  - id: s5_the_threshold
    place_id: rooftop
    resolution_path_count: 2
    description: Crossings narrow and ask for proof at exactly the wrong time.
  - id: s6_the_exchange
    place_id: warehouse
    resolution_path_count: 2
    description: The run becomes a question of transfer, identity, and mistake.

origin_pressures:
  - id: p_route_integrity
    description: Pressure to keep the route coherent after timing loss and forced rerouting.
  - id: p_object_visibility
    description: Pressure from the silver case becoming readable under the wrong light.
  - id: p_concealment_exposure
    description: Pressure between temporary concealment and sudden exposure in public space.
  - id: p_threshold_pressure
    description: Pressure created by crossings, checkpoints, and narrowing passage.
  - id: p_borrowed_refuge
    description: Pressure between temporary shelter and the cost of staying sheltered.
  - id: p_handoff_truth
    description: Pressure around receiver identity, transfer correctness, and mistaken commitment.

reference_markers:
  - id: bridge_wristband
    description: The wristband that once counted as crossing proof and now hangs over threshold scenes.
  - id: dead_pager_glow
    description: The pager's late or unreliable glow as a recurring route signal.
  - id: silver_case_visibility
    description: The silver case becoming readable to watchers before the courier can hide it.
  - id: route_rewritten
    description: The route has been materially reconfigured by detours, refuge, or exchange.
  - id: borrowed_anonymity
    description: Temporary concealment borrowed from a crowd or weather surface.
  - id: wrong_instruction_glow
    description: The pager flashes an instruction too late or at the wrong moment.
  - id: siren_pressure
    description: Rising exposure pressure created by blackout and siren spill.
  - id: roof_access
    description: A viable vertical path onto the roofs has been established.
  - id: threshold_crossed
    description: The courier has crossed a narrowing threshold that changes the route logic.
  - id: inspection_view
    description: The checkpoint or crossing has become readable as an inspection surface.
  - id: borrowed_table
    description: A temporary domestic surface is available for pause, map spread, or inspection.
  - id: silver_case_inspected
    description: The case has been set down and examined rather than merely carried.
  - id: temporary_shelter
    description: The route has entered a brief, unstable shelter state.
  - id: red_string_key
    description: The red-string key has become active as a route or refuge signal.
  - id: apartment_key_red_string
    description: The apartment key on red string is available as a portable refuge token.
  - id: receiver_misalignment
    description: The expected receiver and the visible receiver no longer align cleanly.
  - id: object_visibility_peak
    description: The silver case is at maximum readability in the current exchange space.
  - id: correct_transfer
    description: The transfer has been corrected back toward the intended handoff.

ref_resolution:
  setup_payoff_refs_resolve_against: [events.id, situations.id, reference_markers.id]
  pressure_refs_resolve_against: [origin_pressures.id]
  option_effect_vocabulary: [close, open, clarify, none]

