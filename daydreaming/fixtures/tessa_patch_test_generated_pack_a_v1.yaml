  visual_description: 'Tessa turns the coat check tag over in her palm, the embossed
    number pressing a small red oval into her skin, and she finds herself composing
    the sentence again — not the apology, but the one before it, the one that explains
    why the summary had to be clean, why the audience needed that, why Eli would understand
    if he thought about it from where she was standing. The laughter from the hall
    reaches her muffled and wrong, and she lets it confirm something: the evening
    went well, which means she was right to hold the line. She types *I know that
    looked like* and stops, because the word after that is either *unfair* or *a simplification*,
    and she is still deciding which one she actually believes.'
