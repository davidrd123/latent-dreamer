  visual_description: Tessa straightens a stranger's coat on its hanger, smoothing
    the lapel once, twice, while the applause from the hall comes through the door
    in a shape she still half-owns. She rehearses the reply to Eli's text not as an
    apology but as a clarification — the toast needed a throughline, the room needed
    to leave with something clean, and if his name wasn't the one that landed, that
    was the work protecting itself, not her protecting herself. The distinction feels
    real while her hands are busy, and she holds it there, just long enough to believe
    it might survive being read.
