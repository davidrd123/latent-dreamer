  visual_description: Tessa opens the folded program to the inside panel and finds
    Eli's name exactly where it should be, small and correct in the contributor list,
    and for a moment she lets this stand as evidence — she hadn't erased him, the
    record was always there, anyone who looked would see it. Her thumb moves to the
    reply field on his text but stops short of typing, because the sentence forming
    in her head already sounds like a brief she's filing rather than something she's
    saying to a person, and she recognizes the shape of it from before — the way explanation
    fills every room until there's no air left for the other person to breathe. She
    reads his two lines again, no question mark, no accusation, and decides that responding
    tonight, before she's found the right framing, would only make things worse.
  characters:
  - tessa
  objects:
