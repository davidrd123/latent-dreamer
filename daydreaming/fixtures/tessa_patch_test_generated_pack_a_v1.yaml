  visual_description: 'Tessa runs her thumbnail along the fold of the program until
    she finds her name at the top of the acknowledgments, pressing the crease flat
    as though the paper itself needs correcting. She reads the line twice and decides,
    quietly, that she had kept the toast clean for the donors — that Eli would have
    gone long, would have lost the room, that what she had done was a kind of triage
    the occasion required. From the hall she can still hear the low current of conversation,
    the room still warm with the version of events she gave them, and she begins composing
    a reply to Eli in her head: the third draft is mostly about context, about what
    the moment had needed, and contains his name only once, near the end.'
