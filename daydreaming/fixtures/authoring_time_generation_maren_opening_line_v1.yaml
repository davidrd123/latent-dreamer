  expected_generated_candidate:
    literal_text_oracle: false
    reference_exemplar_text: >
      Maren mouths three different openings at the closed rehearsal-room door,
      rejecting each one for sounding either defensive or theatrical. She writes
      a cleaner sentence on the back of the run sheet, crosses out everything
      after the first clause, and steadies her hand on the handle as if the room
