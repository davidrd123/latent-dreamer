  visual_description: Kai refolds the dish towel on the counter—once, then again,
    aligning the edges with a precision the task doesn't require, the letter still
    face-down where he set it without reading the front. He turns on the faucet to
    rinse a mug that is already clean, and the sound of the water fills the kitchen
    the way silence used to fill a phone line he once let ring out. The harbor is
    maybe three miles away, and he is aware of its direction the way you are aware
    of a bruise you keep almost touching.
