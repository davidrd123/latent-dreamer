  importance: 0.76
  resolution_path_count: 3
  dwell_s: 4.0
  visual_description: Kai fills the electric kettle a second time, though the first
    cup sits untouched and already cold beside the letter. He measures the tea leaves
    with a precision he never bothers with normally, leveling the spoon against the
    rim of the tin, counting seconds under his breath—the kind of focus that requires
    just enough attention to crowd out the smell of salt water he keeps almost noticing,
    as if the harbor has followed the envelope indoors. The letter does not move,
    and he does not look at it, but his back stays angled toward it the way a person
    angles away from a window when they don't want to be seen from outside.
  characters:
