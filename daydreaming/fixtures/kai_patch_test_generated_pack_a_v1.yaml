  visual_description: Kai turns on the faucet to rinse a mug that doesn't need rinsing,
    and the sound of the water fills the kitchen the way he needs it to—present, purposeful,
    covering. He has been calculating, without quite admitting he is calculating,
    how long the walk to the harbor would take if he left at the last possible moment,
    and the number keeps revising itself upward. The letter lies face-down where he
    put it, and he doesn't look at it, but he knows its exact position the way you
    know a bruise without touching it, and the gray at the window is deepening in
    a way that feels less like evening and more like a door closing.
