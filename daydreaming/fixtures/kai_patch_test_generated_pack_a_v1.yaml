  visual_description: Kai refills his coffee cup for the third time, watching the
    pour with the concentration of someone defusing something, the letter still face-down
    on the table where he flipped it an hour ago so the handwriting wouldn't keep
    catching his eye. He wipes the counter in slow horizontal strokes, and when he
    reaches the edge nearest the table he stops, pivots, and wipes the other direction.
    The harbor is six blocks away and the evening is already going gray at the window,
    and he knows that every minute he stands here with a clean counter is a kind of
    answer.
