  visual_description: 'Kai fills the kettle a second time, though the first cup is
    still sitting untouched and warm beside the letter. He keeps his back to the table
    while the water heats, and when the kettle clicks off he pours very slowly, watching
    the steam rise as if it requires his full attention—the kind of focus that costs
    something, that is doing the work of not turning around. The harbor is in the
    room with him anyway: the word tonight pressing through the envelope''s paper
    without him having read it, the way her voice had cut through the salt air six
    months ago, the particular shape of a silence he knows he has sent before.'
