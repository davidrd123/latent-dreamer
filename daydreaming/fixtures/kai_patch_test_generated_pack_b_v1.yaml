  visual_description: Kai refills his coffee cup though it is still half full, watching
    the liquid rise with the focused attention of someone performing a task that matters.
    The letter sits at the edge of his vision, white against the wood, and he turns
    slightly so the window is in front of him instead—the dark strip of water visible
    between the buildings two blocks away, the harbor sitting out there the way a
    word does when you have decided not to say it. He rinses the cup he just filled,
    sets it upside down on the rack, and begins drying the counter in slow, overlapping
    strokes that leave it no drier than before. By the time he looks back at the window,
    he is no longer measuring whether he wants to go, only how much time he has left
    to leave.
