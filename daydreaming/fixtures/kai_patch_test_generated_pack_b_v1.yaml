- id: p_attachment_threat
  description: Pressure from wanting repair with his sister and fearing what contact
    will reopen.
- id: p_obligation
  description: Pressure from the unanswered request to meet tonight.
- id: p_departure_threshold
  description: Pressure created by the fact that leaving now is becoming the only
    real answer.
