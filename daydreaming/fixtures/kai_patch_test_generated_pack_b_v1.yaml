  visual_description: Kai fills the electric kettle a second time, though the first
    cup sits untouched and cooling beside the letter, which he has angled slightly
    so the handwriting faces away from him. He wipes the counter in long strokes,
    following the grain of the laminate with a focus that belongs to a different task
    entirely, one that requires this much attention, this much time. The harbor is
    there anyway—he can feel the particular cold of it, the way her voice carried
    over the water when she said what she said—and the wiping continues, the kettle
    begins to hiss, and the letter does not move.
