  importance: 0.81
  resolution_path_count: 2
  dwell_s: 4.2
  visual_description: 'She turns the coat-check tag over and over between her fingers,
    the cardboard edge going soft from the heat of her palm, and reads back what she''s
    typed: *I know that landed wrong, but the room needed something they could hold
    onto.* The hall noise seeps under the door — someone laughing at the tail of a
    toast — and she lets it fill the silence where Eli''s name should go, because
    naming him would make this an apology, and she isn''t sure it needs to be one
    yet. She''s already told herself twice that clarity was the point, that she would
    have said the same thing about anyone''s work, and the third time the thought
    arrives it comes wearing the shape of a conclusion rather than a defense.'
