  resolution_path_count: 2
  dwell_s: 4.1
  visual_description: 'Tessa runs her fingers along the sleeve of someone else''s
    coat, not taking it, while the muffled applause from the hall rises and then settles
    into the low murmur of dessert conversation. She rehearses the reply to Eli''s
    text in her head — something about the room needing a clean narrative, about how
    attribution gets unwieldy in a toast — and the sentence arranges itself so naturally
    that she almost believes it is simply true. The harm she did to him recedes into
    the logic of the occasion: the format demanded it, the donors wouldn''t have followed
    a longer story, she had protected the work even if not the credit. Her thumb still
    hasn''t moved toward the screen.'
