  importance: 0.77
  resolution_path_count: 2
  dwell_s: 4.0
  visual_description: Through the door, another wave of applause rises and briefly
    fills the coatroom, and Tessa stands still in it the way you stand still in someone
    else's light, her thumb resting against the dark screen of her phone. She runs
    the toast back in her mind — not the cut, exactly, but the logic of it, the way
    a room that size needs a clean line, needs someone willing to hold the shape of
    the thing — and the logic feels sound enough that she almost believes it was generosity,
    not instinct, that made her do it. Eli's name on the screen stays unread while
    she finishes the thought, because once the thought is finished it will be something
    she can say, and something she can say is not the same as something she has to
    take back.
  characters:
