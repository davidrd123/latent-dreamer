  resolution_path_count: 3
  dwell_s: 4.0
  visual_description: 'Tessa presses the event program flatter against her palm, as
    if the fold itself is something she can correct, while the muffled sound of the
    donor hall still moves through the coatroom door. She reads Eli''s text a second
    time and finds, without deciding to, that she has already begun composing the
    distinction in her head: not that she took credit, but that she gave the audience
    what the moment required, which is a different thing, a necessary thing. The program
    lists both their names, she notices, which feels like evidence of something, though
    she is careful not to examine what. She doesn''t type a reply yet; she is still
    finding the version of the story that is true enough to send.'
  characters:
  - tessa
  objects:
